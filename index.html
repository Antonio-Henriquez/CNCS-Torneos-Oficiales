<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCS - TORNEO GLORIAS NAVALES 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F1F5F9; overflow-x: hidden; }
        .gold-master { color: #EAB308; }
        .bg-navy { background-color: #0F172A; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .match-card { background: #1e293b; border-left: 4px solid #EAB308; transition: all 0.2s; }
        .match-card:hover { background: #334155; transform: translateY(-2px); }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // --- BASE DE DATOS REAL CNCS ---
        const JUGADORES_REALES = {
            "SINGLES VARONES HONOR": ["Giancarlo Stango", "Bendel, R.", "Torres, F.", "Herrera, M.", "Gallardo, J.", "Ruiz, C."],
            "SINGLES VARONES PRIMERA": ["García, R.", "Marcos, F.", "Gallardo, M.", "Castro, D.", "Peña, L.", "Fuentes, A.", "Vega, S.", "Díaz, M.", "López, C.", "Soto, E."],
            "SINGLES DAMAS": ["Rosemarie B.", "Javiera Blanco", "González, M.", "Parra, C.", "Campos, L.", "Reyes, A."]
        };

        const HORAS = ['09:00', '11:00', '13:00', '15:00', '17:00'];
        const CANCHAS = [1, 2, 3, 4, 5];

        function App() {
            const [view, setView] = React.useState('prog');
            const [partidos, setPartidos] = React.useState({
                "1_09:00": { j1: "JAVIER GALVÁN G.", j2: "EMILIO GONZALEZ POLZ", cat: "SINGLES VARONES HONOR" },
                "2_09:00": { j1: "GIANCARLO STAGNO", j2: "JOAQUÍN OLEA", cat: "SINGLES VARONES HONOR" },
                "3_09:00": { j1: "RODRIGO PAVEZ", j2: "ALONSO MARAMBIO", cat: "SINGLES VARONES PRIMERA" },
                "5_09:00": { j1: "MARTIN BALMELLI", j2: "TOMÁS VILLALOBOS", cat: "SINGLES VARONES PRIMERA" },
                "1_11:00": { j1: "MAURICIO MUÑOZ D.", j2: "SERGIO CASTILLO", cat: "SINGLES VARONES PRIMERA" },
                "2_11:00": { j1: "ANTONIO HENRIQUEZ R.", j2: "JAVIER GALVÁN S.", cat: "SINGLES VARONES HONOR" },
                "3_11:00": { j1: "PABLO RAMÍREZ", j2: "PABLO SAZO C.", cat: "SINGLES VARONES PRIMERA" }
            });

            return (
                <div className="min-h-screen w-full flex flex-col bg-navy">
                    {/* BARRA SUPERIOR ESTATAL */}
                    <div className="flex items-center px-6 h-16 bg-slate-900 border-b border-slate-800 shrink-0 z-50">
                        <div className="flex items-center gap-3 flex-1">
                            <div className="w-9 h-9 rounded-full bg-yellow-500 flex items-center justify-center text-slate-900 shadow-lg font-bold">🏆</div>
                            <div className="flex flex-col">
                                <span className="text-[10px] gold-master font-black tracking-widest leading-none mb-1 uppercase">Club de Campo Las Salinas</span>
                                <h1 className="font-extrabold text-lg text-white uppercase italic leading-none">TORNEO <span className="gold-master">GLORIAS NAVALES 2026</span></h1>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('prog')} className={`px-4 py-2 rounded-lg text-xs font-black transition-all ${view === 'prog' ? 'bg-yellow-500 text-slate-900' : 'text-slate-400 border border-slate-700'}`}>PROGRAMACIÓN</button>
                            <button onClick={() => setView('llaves')} className={`px-4 py-2 rounded-lg text-xs font-black transition-all ${view === 'llaves' ? 'bg-yellow-500 text-slate-900' : 'text-slate-400 border border-slate-700'}`}>LLAVES</button>
                        </div>
                    </div>

                    <div className="flex-1 p-6 overflow-auto">
                        <div className="mb-6 flex justify-between items-end border-b border-slate-800 pb-4">
                            <div>
                                <h2 className="text-3xl font-black text-white italic uppercase tracking-tighter">Sábado 02 de Mayo</h2>
                                <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">Tablero de Mando y Control de Canchas</p>
                            </div>
                            <div className="text-emerald-400 text-[10px] font-bold border border-emerald-500/30 px-3 py-1 rounded-full bg-emerald-500/10">● DASHBOARD OFICIAL EN LÍNEA</div>
                        </div>

                        {view === 'prog' ? (
                            <div className="overflow-x-auto rounded-3xl border border-slate-800 shadow-2xl">

                                    <thead className="bg-slate-900/90">
                                        <tr>
                                            <th className="p-4 text-left border-r border-slate-800 text-[10px] gold-master font-black w-24">HORA</th>

                                                <th key={c} className="p-4 border-r border-slate-800 last:border-0 text-center">
                                                    <div className="text-white text-sm font-bold">Cancha {c}</div>
                                                    <div className="text-[9px] text-slate-500 uppercase font-black">{c === 5 ? 'Arcilla / Tarde' : 'Arcilla'}</div>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {HORAS.map(h => (
                                            <tr key={h} className="border-b border-slate-800 last:border-0">
                                                <td className="p-4 font-mono text-sky-400 text-lg font-black border-r border-slate-800 bg-slate-900/20">{h}</td>
                                                {CANCHAS.map(c => {
                                                    const p = partidos[`${c}_${h}`];
                                                    return (
                                                        <td key={c} className="p-2 border-r border-slate-800 last:border-0 h-32 w-64 min-w-[200px]">
                                                            {p ? (
                                                                <div className="match-card p-3 rounded-xl h-full flex flex-col justify-between shadow-lg">
                                                                    <div>
                                                                        <p className="text-[8px] gold-master font-black mb-1 truncate uppercase tracking-tighter">{p.cat} —</p>
                                                                        <p className="text-[11px] font-extrabold text-white leading-tight uppercase">{p.j1}</p>
                                                                        <p className="text-[9px] text-slate-500 my-0.5 font-bold italic">vs</p>
                                                                        <p className="text-[11px] font-extrabold text-white leading-tight uppercase">{p.j2}</p>
                                                                    </div>
                                                                    <div className="flex gap-1 mt-2">
                                                                        <button className="flex-1 bg-sky-500 text-slate-900 text-[9px] font-black py-1 rounded shadow-md uppercase">🏆 Informar</button>
                                                                        <button className="px-2 text-slate-500 hover:text-red-400 text-xs font-bold">×</button>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="h-full w-full border border-dashed border-slate-800 rounded-xl flex items-center justify-center opacity-20 hover:opacity-50 transition-opacity cursor-pointer">
                                                                    <span className="text-[10px] font-black uppercase tracking-widest">+ Programar</span>
                                                                </div>
                                                            )}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center h-96 text-slate-600">
                                <div className="text-4xl mb-4">📈</div>
                                <h3 className="text-xl font-bold uppercase tracking-widest text-slate-400">Generando Cuadros Matemáticos...</h3>
                                <p className="text-xs italic mt-2">Seleccione una categoría para previsualizar los cruces.</p>
                            </div>
                        )}
                    </div>

                    {/* PIE DE PÁGINA */}
                    <div className="h-10 bg-slate-900 border-t border-slate-800 flex items-center px-8 justify-between text-[10px] text-slate-500 font-bold tracking-widest">
                        <span>SISTEMA TABLERO DE MANDO Y CONTROL V1.2</span>
                        <span className="gold-master italic uppercase">Desarrollado para CNCS Salinas — Almirante al Mando</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
