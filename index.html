<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCS - TORNEO ESCALERILLA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F1F5F9; overflow-x: hidden; }
        .gold-master { color: #EAB308; }
        .bg-navy { background-color: #0F172A; }
        .match-card { background: #1e293b; border-left: 4px solid #EAB308; transition: all 0.2s; position: relative; }
        .match-card:hover { background: #334155; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .connector-right::after { content: ''; position: absolute; right: -24px; top: 50%; width: 24px; height: 2px; background-color: #475569; }
        .connector-top::before { content: ''; position: absolute; right: -24px; top: 50%; width: 2px; height: 100%; background-color: #475569; }
        .connector-bottom::before { content: ''; position: absolute; right: -24px; bottom: 50%; width: 2px; height: 100%; background-color: #475569; }
        .connector-left::after { content: ''; position: absolute; left: -24px; top: 50%; width: 24px; height: 2px; background-color: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // --- INICIALIZACIÓN DE FIREBASE (SOLO LECTURA) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBxVUGkT3YGuMHczsTsusYZhXGW88iCKQE",
            authDomain: "toreneo-rud-cncs.firebaseapp.com",
            databaseURL: "https://toreneo-rud-cncs-default-rtdb.firebaseio.com",
            projectId: "toreneo-rud-cncs",
            storageBucket: "toreneo-rud-cncs.firebasestorage.app",
            messagingSenderId: "1041320850078",
            appId: "1:1041320850078:web:c1565b8099e86f120ac18f",
            measurementId: "G-BYGYL8J293"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const DIAS_TORNEO = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        const HORAS = ['09:00', '11:00', '13:00', '15:00', '17:00', '19:00'];
        const CANCHAS = [1, 2, 3, 4, 5];

        const CATEGORIAS_ICONS = {
            "Singles Honor": "🏆", "Singles Varones Primera": "🥇", "Singles Varones Segunda": "🥈",
            "Singles Varones +70": "🏅", "Singles Damas": "👑", "Dobles Varones Primera": "👥",
            "Dobles Varones Segunda": "👥", "Dobles Mixto": "👫"
        };
        const CATEGORIAS = Object.keys(CATEGORIAS_ICONS);

        const JUGADORES_BASE = {
            "Singles Honor": ["Giancarlo Stagno", "Bendel, R.", "Torres, F.", "Herrera, M.", "Javier Galván G.", "Ruiz, C.", "Joaquín Olea", "Emilio Gonzalez"],
            "Singles Varones Primera": ["García, R.", "Marcos, F.", "Rodrigo Pavez", "Alonso Marambio", "Martin Balmelli", "Tomás Villalobos", "Mauricio Muñoz D.", "Sergio Castillo", "Pablo Ramírez", "Pablo Sazo C."]
        };

        function BracketNode({ match, roundIndex, matchIndex, totalRounds }) {
            const isFinal = roundIndex === totalRounds - 1;
            const isEven = matchIndex % 2 === 0;
            let connectorClass = "";
            if (!isFinal) {
                connectorClass += " connector-right ";
                connectorClass += isEven ? " connector-top " : " connector-bottom ";
            }
            if (roundIndex > 0) connectorClass += " connector-left ";

            return (
                <div className={`w-64 h-24 mb-6 shrink-0 flex items-center relative ${connectorClass}`}>
                    <div className="match-card w-full p-3 rounded-xl shadow-lg z-10 flex flex-col justify-center">
                        <div className="flex justify-between items-center mb-1">
                            <span className={`text-[11px] font-extrabold uppercase truncate ${match.winner === 1 ? 'text-emerald-400' : 'text-white'}`}>{match.j1}</span>
                            <span className="text-[10px] font-mono text-slate-400">{match.score?.split(' ')[0] || '-'}</span>
                        </div>
                        <div className="border-t border-slate-700/50 my-1"></div>
                        <div className="flex justify-between items-center mt-1">
                            <span className={`text-[11px] font-extrabold uppercase truncate ${match.winner === 2 ? 'text-emerald-400' : 'text-white'}`}>{match.j2}</span>
                            <span className="text-[10px] font-mono text-slate-400">{match.score?.split(' ')[1] || '-'}</span>
                        </div>
                        {isFinal && <div className="absolute -top-3 -right-3 w-8 h-8 bg-yellow-500 rounded-full flex items-center justify-center text-slate-900 shadow-[0_0_15px_rgba(234,179,8,0.5)]">🏆</div>}
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = React.useState('prog'); 
            const [activeDay, setActiveDay] = React.useState('Sábado');
            const [selectedCat, setSelectedCat] = React.useState(CATEGORIAS[0]);
            const [partidos, setPartidos] = React.useState({});
            const [llavesData, setLlavesData] = React.useState({});
            const [conexion, setConexion] = React.useState('Conectando...');

            React.useEffect(() => {
                // Escucha de Partidos Programados
                const partidosRef = db.ref('cncs_torneo/partidos');
                partidosRef.on('value', (snapshot) => {
                    setPartidos(snapshot.val() || {});
                    setConexion('EN VIVO');
                }, () => setConexion('DESCONECTADO'));

                // Escucha de Llaves y Resultados
                const llavesRef = db.ref('cncs_torneo/llaves');
                llavesRef.on('value', (snapshot) => {
                    setLlavesData(snapshot.val() || {});
                });

                return () => { partidosRef.off(); llavesRef.off(); };
            }, []);

            const getRoundsForCategory = (cat) => {
                // Si hay datos en la nube para esta llave, los usa. Si no, genera el cuadro vacío base.
                if(llavesData[cat]) return llavesData[cat];

                const players = JUGADORES_BASE[cat] || ["Por definir", "Por definir", "Por definir", "Por definir"];
                const qf = [];
                for(let i=0; i<players.length; i+=2) qf.push({ id: `qf_${i}`, j1: players[i], j2: players[i+1] || "BYE", score: "", winner: null });
                const sf = [{ id: "sf_0", j1: "Por definir", j2: "Por definir", score: "", winner: null }, { id: "sf_1", j1: "Por definir", j2: "Por definir", score: "", winner: null }];
                const final = [{ id: "final", j1: "Por definir", j2: "Por definir", score: "", winner: null }];
                return [qf, sf, final];
            };

            return (
                <div className="min-h-screen w-full flex flex-col bg-navy">
                    <div className="flex items-center px-6 h-16 bg-slate-900 border-b border-slate-800 shrink-0 z-50">
                        <div className="flex items-center gap-3 flex-1">
                            <div className="w-9 h-9 rounded-full bg-yellow-500 flex items-center justify-center text-slate-900 shadow-lg font-bold">🏆</div>
                            <div className="flex flex-col">
                                <span className="text-[10px] gold-master font-black tracking-widest leading-none mb-1 uppercase">Club de Campo Las Salinas</span>
                                <h1 className="font-extrabold text-lg text-white uppercase italic leading-none">TORNEO <span className="gold-master">ESCALERILLA CNCS</span></h1>
                            </div>
                        </div>
                        <div className="flex gap-2 bg-slate-800 p-1 rounded-lg">
                            <button onClick={() => setView('prog')} className={`px-4 py-1.5 rounded text-xs font-black transition-all ${view === 'prog' ? 'bg-yellow-500 text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>PROGRAMACIÓN</button>
                            <button onClick={() => setView('llaves')} className={`px-4 py-1.5 rounded text-xs font-black transition-all ${view === 'llaves' ? 'bg-yellow-500 text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>LLAVES</button>
                        </div>
                    </div>

                    <div className="flex-1 p-6 overflow-auto">
                        {view === 'prog' && (
                            <div className="flex flex-col h-full gap-4">
                                <div className="flex justify-between items-end border-b border-slate-800 pb-4">
                                    <div className="flex flex-col gap-2">
                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Jornadas Disponibles</p>
                                        <div className="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                                            {DIAS_TORNEO.map(dia => (
                                                <button key={dia} onClick={() => setActiveDay(dia)} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all border shrink-0 ${activeDay === dia ? 'bg-emerald-600 border-emerald-500 text-white shadow-[0_0_10px_rgba(16,185,129,0.3)]' : 'border-slate-700 text-slate-400 hover:bg-slate-800'}`}>
                                                    {dia}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className={`flex items-center gap-2 text-[10px] font-bold border px-3 py-1 rounded-full uppercase tracking-widest ${conexion === 'EN VIVO' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30' : 'bg-slate-800 text-slate-500 border-slate-700'}`}>
                                        <span className={`w-2 h-2 rounded-full ${conexion === 'EN VIVO' ? 'bg-emerald-400 animate-pulse' : 'bg-slate-500'}`}></span>
                                        {conexion}
                                    </div>
                                </div>

                                <div className="overflow-x-auto rounded-xl border border-slate-800 shadow-2xl">
                                    <table className="w-full border-collapse">
                                        <thead className="bg-slate-900/90">
                                            <tr>
                                                <th className="p-4 text-left border-r border-slate-800 text-[10px] gold-master font-black w-24">HORA</th>
                                                {CANCHAS.map(c => <th key={c} className="p-4 border-r border-slate-800 last:border-0 text-center w-64 min-w-[220px]"><div className="text-white text-sm font-bold">Cancha {c}</div></th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {HORAS.map(h => (
                                                <tr key={h} className="border-b border-slate-800 last:border-0">
                                                    <td className="p-4 font-mono text-sky-400 text-lg font-black border-r border-slate-800 bg-slate-900/20">{h}</td>
                                                    {CANCHAS.map(c => {
                                                        const p = partidos[`${activeDay}_${c}_${h}`];
                                                        return (
                                                            <td key={c} className="p-2 border-r border-slate-800 last:border-0 h-32">
                                                                {p ? (
                                                                    <div className="match-card p-3 rounded-xl h-full flex flex-col justify-center shadow-lg relative">
                                                                        <p className="text-[8px] gold-master font-black mb-2 truncate uppercase tracking-tighter">{CATEGORIAS_ICONS[p.cat] || '🎾'} {p.cat}</p>
                                                                        <p className="text-[11px] font-extrabold text-white leading-tight uppercase truncate">{p.j1}</p>
                                                                        <p className="text-[9px] text-slate-500 my-1 font-bold italic">vs</p>
                                                                        <p className="text-[11px] font-extrabold text-white leading-tight uppercase truncate">{p.j2}</p>
                                                                    </div>
                                                                ) : (
                                                                    <div className="h-full w-full border border-dashed border-slate-800 rounded-xl flex items-center justify-center opacity-30">
                                                                        <span className="text-[9px] font-bold uppercase tracking-widest text-slate-500">Sin programación</span>
                                                                    </div>
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === 'llaves' && (
                            <div className="flex flex-col gap-6 h-full">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {CATEGORIAS.map(cat => (
                                        <button key={cat} onClick={() => setSelectedCat(cat)} className={`p-3 rounded-xl text-xs font-black uppercase transition-all flex items-center gap-2 border ${selectedCat === cat ? 'bg-yellow-500 border-yellow-500 text-slate-900 shadow-lg scale-[1.02]' : 'bg-slate-800 border-slate-700 text-slate-400 hover:bg-slate-700'}`}>
                                            <span className="text-xl">{CATEGORIAS_ICONS[cat] || '🎾'}</span>
                                            <span className="text-left leading-tight">{cat}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="p-8 overflow-x-auto bg-slate-900/50 border border-slate-800 rounded-3xl shadow-2xl relative min-h-[500px]">
                                    <div className="flex gap-16 min-w-max">
                                        {getRoundsForCategory(selectedCat).map((round, rIndex, roundsArray) => (
                                            <div key={rIndex} className="flex flex-col justify-around relative">
                                                <div className="absolute -top-6 left-0 w-full text-center text-[10px] gold-master font-black uppercase tracking-[0.2em]">
                                                    {rIndex === roundsArray.length - 1 ? 'Final' : rIndex === 0 && roundsArray.length > 2 ? 'Cuartos' : 'Semifinal'}
                                                </div>
                                                {round.map((match, mIndex) => <BracketNode key={match.id} match={match} roundIndex={rIndex} matchIndex={mIndex} totalRounds={roundsArray.length} />)}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
