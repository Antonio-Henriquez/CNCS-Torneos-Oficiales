<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCS - Torneos Oficiales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --navy: #0F172A; --gold: #EAB308; }
        body { background-color: var(--navy); color: white; font-family: 'Inter', sans-serif; }
        .gold-border { border: 2px solid var(--gold); }
        .card-bg { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <header class="p-6 text-center border-b border-yellow-600/30">
        <h1 class="text-3xl font-bold text-yellow-500 uppercase tracking-widest">GLORIAS NAVALES 2026</h1>
        <p class="text-gray-400 mt-2">Club de Campo las Salinas - Centro de Control</p>
    </header>

    <main class="container mx-auto p-4 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="stats-container">
            <div class="card-bg p-6 rounded-xl gold-border text-center">
                <h3 class="text-yellow-500 font-bold mb-1">SÁBADO 02 MAYO</h3>
                <p class="text-2xl font-bold">09:00 AM</p>
                <p class="text-sm text-gray-400">Inicio de Jornada</p>
            </div>
            <!-- Aquí aparecerán los datos cargados -->
        </div>

        <div class="bg-slate-900/50 p-6 rounded-2xl gold-border min-h-[400px]">
            <h2 class="text-xl font-semibold mb-6 border-l-4 border-yellow-500 pl-3">TABLERO DE MANDO Y CONTROL</h2>
            <div id="bracket-display" class="grid grid-cols-1 gap-8">
                <!-- Las llaves se generarán automáticamente aquí -->
            </div>
        </div>
    </main>

    <script>
        // DATOS MAESTROS RECUPERADOS
        const categorias = {
            "SINGLES VARORES PRIMERA": ["JAVIER GALVÁN G", "EMILIO GONZALEZ POLZ", "GIANCARLO STAGNO", "JOAQUÍN OLEA"],
            "SINGLES DAMAS": ["IGNACIA GAJARDO O", "JAVIERA BLANCO", "CLAUDIA TCHIMINO N.", "JULIETA MALANDRE"]
        };

        const bracketDisplay = document.getElementById('bracket-display');
        bracketDisplay.innerHTML = ""; // Limpiar el cargando...

        Object.keys(categorias).forEach(cat => {
            let html = `<div class="p-4 bg-slate-800/50 rounded-lg">
                <h3 class="text-yellow-500 font-bold mb-4 uppercase border-b border-yellow-500/20 pb-2">${cat}</h3>
                <div class="flex flex-wrap gap-4">`;
            
            categorias[cat].forEach(player => {
                html += `<div class="bg-slate-700 p-3 rounded-md border-l-4 border-green-500 w-full md:w-48">
                    <span class="text-xs text-gray-400">Jugador</span>
                    <p class="font-bold text-sm truncate">${player}</p>
                </div>`;
            });

            html += `</div></div>`;
            bracketDisplay.innerHTML += html;
        });
    </script>
</body>
</html>
